name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin/x64
            os: macos-latest
            target: x86_64-apple-darwin
            tauri_args: --config src-tauri/tauri.darwin.x64.conf.json
          - platform: darwin/arm64
            os: macos-latest
            target: aarch64-apple-darwin
            tauri_args: --config src-tauri/tauri.darwin.arm64.conf.json
          - platform: linux/x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            tauri_args: --config src-tauri/tauri.linux.x64.conf.json
          - platform: linux/arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            tauri_args: --config src-tauri/tauri.linux.arm64.conf.json
          - platform: win32/x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            tauri_args: --config src-tauri/tauri.win32.x64.conf.json
          - platform: win32/ia32
            os: windows-latest
            target: i686-pc-windows-msvc
            tauri_args: --config src-tauri/tauri.win32.ia32.conf.json

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject updater public key from secrets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          node -e "const fs=require('node:fs');const p='src-tauri/tauri.conf.json';const key=(process.env.TAURI_UPDATER_PUBKEY||'').trim();if(!key){console.error('TAURI_UPDATER_PUBKEY secret is required for tagged releases');process.exit(1);}const c=JSON.parse(fs.readFileSync(p,'utf8'));c.plugins??={};c.plugins.updater??={};c.plugins.updater.pubkey=key;fs.writeFileSync(p,JSON.stringify(c,null,2)+'\n');console.log('Injected updater pubkey into tauri.conf.json for this workflow run.');"
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}

      - name: Build and publish release artifacts (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target ${{ matrix.target }} ${{ matrix.tauri_args }}
          tagName: ${{ github.ref_name }}
          releaseName: Risuko ${{ github.ref_name }}
          releaseBody: See the assets for this release.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TEAM_ID: ${{ secrets.team_id }}
          APPLE_ID: ${{ secrets.apple_id }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.apple_app_specific_password }}

      - name: Build release artifacts (manual)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: pnpm tauri build --target ${{ matrix.target }} ${{ matrix.tauri_args }}
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker }}

      - name: Verify local bundle output exists
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [ ! -d "$bundle_dir" ]; then
            echo "::error::No bundle output found at $bundle_dir"
            ls -la "src-tauri/target/${{ matrix.target }}/release" || true
            exit 1
          fi
          find "$bundle_dir" -maxdepth 3 -type f | sed 's/^/built: /'

      # ── Package app bundle with standardized name ──
      # Naming: Risuko_{version}_{os}_{arch}.{ext}
      # Matches process.platform / process.arch in Node.js exactly.
      - name: Package app bundle with standardized name (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          IFS='/' read -r os arch <<< "${{ matrix.platform }}"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            version="${{ github.ref_name }}"; version="${version#v}"
          else
            version=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          fi
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          if [[ "$os" == "darwin" ]]; then
            asset="Risuko_${version}_${os}_${arch}.app.tar.gz"
            tar czf "$asset" -C "$bundle_dir/macos" "Risuko.app"
          else
            appimage=$(find "$bundle_dir/appimage" -name "*.AppImage" -type f | head -1)
            asset="Risuko_${version}_${os}_${arch}.AppImage"
            cp "$appimage" "$asset"
          fi
          echo "APP_ASSET=$asset" >> "$GITHUB_ENV"
          echo "APP_PLATFORM_LABEL=${os}-${arch}" >> "$GITHUB_ENV"

      - name: Package app bundle with standardized name (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $parts = "${{ matrix.platform }}" -split "/"
          $os = $parts[0]; $arch = $parts[1]
          if ("${{ github.ref }}" -match "^refs/tags/") {
            $version = "${{ github.ref_name }}" -replace "^v", ""
          } else {
            $cargo = Get-Content "src-tauri/Cargo.toml" -Raw
            $version = [regex]::Match($cargo, '^version\s*=\s*"([^"]+)"', [System.Text.RegularExpressions.RegexOptions]::Multiline).Groups[1].Value
          }
          $setup = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/nsis" -Filter "*-setup.exe" | Select-Object -First 1
          $asset = "Risuko_${version}_${os}_${arch}.setup.exe"
          Copy-Item $setup.FullName $asset
          "APP_ASSET=$asset" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          "APP_PLATFORM_LABEL=${os}-${arch}" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Upload standardized app bundle to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.APP_ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standardized app bundle artifact (manual builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ env.APP_PLATFORM_LABEL }}
          path: ${{ env.APP_ASSET }}

      # ── Build standalone risuko-cli binary ──
      - name: Build risuko-cli binary
        if: matrix.target != 'i686-pc-windows-msvc'
        working-directory: src-tauri
        run: cargo build --release --target ${{ matrix.target }} -p risuko-cli

      - name: Package risuko-cli binary (unix)
        if: matrix.target != 'i686-pc-windows-msvc' && runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          bin="src-tauri/target/${{ matrix.target }}/release/risuko"
          chmod +x "$bin"
          # Derive a short platform label: darwin-arm64, linux-x64, etc.
          case "${{ matrix.platform }}" in
            darwin/arm64) label="darwin-arm64" ;;
            darwin/x64)   label="darwin-x64" ;;
            linux/x64)    label="linux-x64" ;;
            linux/arm64)  label="linux-arm64" ;;
            *)            label="${{ matrix.target }}" ;;
          esac
          tar czf "risuko-cli-${label}.tar.gz" -C "$(dirname "$bin")" risuko
          echo "CLI_ASSET=risuko-cli-${label}.tar.gz" >> "$GITHUB_ENV"

      - name: Package risuko-cli binary (windows)
        if: matrix.target != 'i686-pc-windows-msvc' && runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "src-tauri/target/${{ matrix.target }}/release/risuko.exe"
          $label = "win32-x64"
          if ("${{ matrix.target }}" -match "aarch64") { $label = "win32-arm64" }
          Compress-Archive -Path $bin -DestinationPath "risuko-cli-${label}.zip"
          echo "CLI_ASSET=risuko-cli-${label}.zip" >> $env:GITHUB_ENV

      - name: Upload risuko-cli to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.target != 'i686-pc-windows-msvc'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.CLI_ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload risuko-cli artifact (manual builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.target != 'i686-pc-windows-msvc' }}
        uses: actions/upload-artifact@v4
        with:
          name: risuko-cli-${{ matrix.target }}
          path: ${{ env.CLI_ASSET }}

      - name: Dump macOS DMG diagnostics on failure
        if: failure() && startsWith(matrix.platform, 'darwin')
        shell: bash
        run: |
          set -euxo pipefail
          dmg_dir="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          if [ -d "$dmg_dir" ]; then
            echo "== DMG bundle directory =="
            ls -la "$dmg_dir" || true
            if [ -f "$dmg_dir/bundle_dmg.sh" ]; then
              echo "== bundle_dmg.sh =="
              sed -n '1,260p' "$dmg_dir/bundle_dmg.sh" || true
            fi
            for f in "$dmg_dir"/*.log; do
              if [ -f "$f" ]; then
                echo "== log: $f =="
                cat "$f" || true
              fi
            done
          else
            echo "DMG directory not found: $dmg_dir"
          fi
